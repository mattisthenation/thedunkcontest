<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Dunk Contest - Debug Mode</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .debug-panel {
      position: fixed;
      top: 10px;
      right: 10px;
      background-color: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 15px;
      border-radius: 5px;
      width: 300px;
      z-index: 1000;
    }
    .debug-button {
      padding: 5px 10px;
      margin: 5px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    .debug-button:hover {
      background-color: #45a049;
    }
    .log-panel {
      height: 150px;
      background-color: #333;
      color: #0f0;
      font-family: monospace;
      padding: 5px;
      overflow-y: auto;
      margin-top: 10px;
      border: 1px solid #555;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="scoreboard">
      <h2>Scoreboard</h2>
      <div id="player-scores"></div>
    </div>
    <div id="game-info">
      <p>Your name: <span id="player-name"></span></p>
      <p>Score: <span id="player-score">0</span></p>
      <div id="controls-info">
        <p>Controls:</p>
        <ul>
          <li>Move: WASD or Arrow Keys</li>
          <li>Jump/Dunk: Spacebar</li>
          <li>Get Ball: E key</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="debug-panel">
    <h3>Debug Panel</h3>
    <button class="debug-button" id="test-render">Test Rendering</button>
    <button class="debug-button" id="test-socket">Test Socket</button>
    <button class="debug-button" id="spawn-test-player">Spawn Test Player</button>
    <button class="debug-button" id="spawn-test-ball">Spawn Test Ball</button>
    <div class="log-panel" id="debug-log"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Debug logging
    function debugLog(message) {
      const logPanel = document.getElementById('debug-log');
      const logEntry = document.createElement('div');
      logEntry.textContent = `[${new Date().toISOString().substr(11, 8)}] ${message}`;
      logPanel.appendChild(logEntry);
      logPanel.scrollTop = logPanel.scrollHeight;
      console.log(message);
    }

    // Canvas setup
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 600;
    debugLog('Canvas initialized');

    // Test basic rendering
    document.getElementById('test-render').addEventListener('click', () => {
      debugLog('Testing rendering...');
      
      // Clear canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw court background
      ctx.fillStyle = '#804000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw court markings
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
      
      // Draw center circle
      ctx.beginPath();
      ctx.arc(canvas.width / 2, canvas.height / 2, 60, 0, Math.PI * 2);
      ctx.stroke();
      
      // Draw hoop
      const hoopX = canvas.width / 2;
      const hoopY = 50;
      
      // Backboard
      ctx.fillStyle = '#fff';
      ctx.fillRect(hoopX - 30, hoopY - 40, 60, 35);
      
      // Rim
      ctx.beginPath();
      ctx.arc(hoopX, hoopY, 15, 0, Math.PI, false);
      ctx.strokeStyle = '#ff0000';
      ctx.lineWidth = 3;
      ctx.stroke();
      
      debugLog('Basic rendering test complete');
    });

    // Test dummy player rendering
    document.getElementById('spawn-test-player').addEventListener('click', () => {
      debugLog('Spawning test player...');
      
      // Draw a test player
      const playerX = canvas.width / 2;
      const playerY = canvas.height / 2 + 100;
      
      // Player body
      ctx.fillStyle = 'blue';
      ctx.fillRect(playerX - 15, playerY - 25, 30, 45);
      
      // Player head
      ctx.beginPath();
      ctx.arc(playerX, playerY - 35, 10, 0, Math.PI * 2);
      ctx.fillStyle = '#ffd0a0';
      ctx.fill();
      
      // Player name
      ctx.fillStyle = '#fff';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Test Player', playerX, playerY - 45);
      
      debugLog('Test player rendered');
    });

    // Test dummy basketball rendering
    document.getElementById('spawn-test-ball').addEventListener('click', () => {
      debugLog('Spawning test basketball...');
      
      // Draw a test basketball
      const ballX = canvas.width / 2;
      const ballY = canvas.height / 2;
      
      // Ball
      ctx.beginPath();
      ctx.arc(ballX, ballY, 10, 0, Math.PI * 2);
      ctx.fillStyle = '#ff6600';
      ctx.fill();
      
      // Ball lines
      ctx.beginPath();
      ctx.arc(ballX, ballY, 10, 0, Math.PI * 2);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(ballX - 10, ballY);
      ctx.lineTo(ballX + 10, ballY);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.arc(ballX, ballY, 10, Math.PI / 2, 3 * Math.PI / 2);
      ctx.stroke();
      
      debugLog('Test basketball rendered');
    });

    // Test socket connection
    document.getElementById('test-socket').addEventListener('click', () => {
      debugLog('Testing socket connection...');
      
      try {
        const socket = io();
        
        socket.on('connect', () => {
          debugLog(`Socket connected with ID: ${socket.id}`);
          
          // Send a test message to the server
          socket.emit('test', { message: 'Test message from debug page' });
          
          // Listen for response
          socket.on('testResponse', (data) => {
            debugLog(`Received test response: ${JSON.stringify(data)}`);
          });
          
          // Disconnect after test
          setTimeout(() => {
            socket.disconnect();
            debugLog('Socket disconnected after test');
          }, 3000);
        });
        
        socket.on('connect_error', (error) => {
          debugLog(`Socket connection error: ${error.message}`);
        });
      } catch (error) {
        debugLog(`Socket test error: ${error.message}`);
      }
    });

    // Initial debug
    debugLog('Debug page loaded');
  </script>
</body>
</html>
