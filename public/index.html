<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE DUNK CONTEST</title>
  <link rel="stylesheet" href="/css/style.css">
  <script type="importmap">
    { "imports": { "three": "/vendor/three.module.js" } }
  </script>
</head>
<body>
  <div id="game"></div>

  <div id="gameUI">
    <div id="connectionStatus" class="off">● CONNECTING…</div>
    <div id="courtName"></div>

    <div id="scoreBoard">
      <h3>★ SCORES ★</h3>
      <div id="scoreList"></div>
    </div>

    <div id="fireBadge">🔥 ON FIRE 🔥</div>
    <div id="announcement"></div>

    <div id="instructions">
      <b>WASD</b> MOVE&nbsp;&nbsp;<b>SPACE</b> JUMP&nbsp;&nbsp;<b>E</b> SHOOT / DUNK / GRAB&nbsp;&nbsp;<b>ESC</b> MENU
    </div>
  </div>

  <div id="lobby">
    <div class="lobbyInner">
      <h1>THE<br>DUNK<br>CONTEST</h1>
      <p class="tag">PICK YOUR PLAYER · PICK YOUR COURT · GET BUCKETS</p>

      <div class="lobbyCols">
        <div class="lobbyCol">
          <h2>YOUR BALLER</h2>
          <input id="nameInput" maxlength="16" placeholder="ENTER NAME" autocomplete="off">
          <div id="creatorMount"></div>
        </div>

        <div class="lobbyCol">
          <h2>WORLD TOUR</h2>
          <div id="courtGrid"></div>
          <div id="leaderboardMount"></div>
        </div>
      </div>

      <div class="lobbyActions">
        <button id="playBtn">▶ &nbsp;PLAY</button>
        <button id="resumeBtn" class="ghost">RESUME</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
