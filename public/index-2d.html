<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Dunk Contest</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="scoreboard">
      <h2>Scoreboard</h2>
      <div id="player-scores"></div>
    </div>
    <div id="game-info">
      <p>Your name: <span id="player-name"></span></p>
      <p>Score: <span id="player-score">0</span></p>
      <div id="controls-info">
        <p>Controls:</p>
        <ul>
          <li>Move: WASD or Arrow Keys</li>
          <li>Jump/Dunk: Spacebar</li>
          <li>Get Ball: E key</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/sound.js" type="module"></script>
  <script src="js/particles.js" type="module"></script>
  <!-- Sprite player system -->
  <script src="js/sprite-player-generator.js"></script>
  <script src="js/sprite-player.js"></script>
  <script src="js/three-game-integration.js"></script>
  <script src="js/game.js" type="module"></script>
</body>
</html>
