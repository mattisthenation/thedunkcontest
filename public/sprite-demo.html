<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Jam Style Sprite Players Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: #000;
        }
        
        canvas {
            display: block;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #FFD700;
            font-size: 32px;
            text-align: center;
            text-shadow: 3px 3px 0px #FF0000;
            animation: pulse 1s infinite alternate;
        }
        
        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.1); }
        }
        
        /* NBA Jam style font loading */
        @font-face {
            font-family: 'ArcadeFont';
            src: local('Courier New Bold'), local('Courier-Bold'), local('monospace');
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="loading">
        LOADING...<br>
        <span style="font-size: 16px;">GET READY TO JAM!</span>
    </div>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Sprite Player Scripts -->
    <script src="/js/sprite-player-generator.js"></script>
    <script src="/js/sprite-player.js"></script>
    <script src="/js/sprite-player-demo.js"></script>
    
    <script>
        // Hide loading message after a short delay
        setTimeout(() => {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'none';
            }
        }, 1500);
    </script>
</body>
</html>
