<!DOCTYPE html>
<html>
<head>
    <title>Ball Pickup Test</title>
    <style>
        body {
            font-family: monospace;
            margin: 20px;
            background: #111;
            color: #0f0;
        }
        .log {
            border: 1px solid #0f0;
            padding: 10px;
            margin: 10px 0;
            background: #000;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0a0;
        }
    </style>
</head>
<body>
    <h1>Ball Pickup Debug Test</h1>
    
    <div class="log" id="status">Status: Not connected</div>
    
    <div>
        <button onclick="moveToCenter()">Move to Center</button>
        <button onclick="moveToBall()">Move to Ball</button>
        <button onclick="tryPickup()">Try Pickup (E)</button>
    </div>
    
    <div class="log" id="playerInfo">Player: -</div>
    <div class="log" id="ballInfo">Ball: -</div>
    <div class="log" id="distance">Distance: -</div>
    
    <h2>Instructions:</h2>
    <ol>
        <li>Open the game in another tab/window</li>
        <li>Use the buttons above to test ball pickup</li>
        <li>Check the console for detailed logs</li>
    </ol>
    
    <script>
        // Simple test to understand the coordinate system
        
        function convert2DToServer3D(x2d, y2d) {
            const x3d = ((x2d - 400) / 400) * 10;
            const z3d = ((y2d - 300) / 300) * 15;
            return { x: x3d, y: 0, z: z3d };
        }
        
        function convertServer3DTo2D(x3d, y3d, z3d) {
            const x2d = (x3d / 10) * 400 + 400;
            const y2d = (z3d / 15) * 300 + 300;
            return { x: x2d, y: y2d };
        }
        
        // Test conversions
        console.log('=== Coordinate Conversion Tests ===');
        console.log('Center (400,300) -> 3D:', convert2DToServer3D(400, 300));
        console.log('Top-left (0,0) -> 3D:', convert2DToServer3D(0, 0));
        console.log('Bottom-right (800,600) -> 3D:', convert2DToServer3D(800, 600));
        
        console.log('3D (0,0,0) -> 2D:', convertServer3DTo2D(0, 0, 0));
        console.log('3D (-10,0,-15) -> 2D:', convertServer3DTo2D(-10, 0, -15));
        console.log('3D (10,0,15) -> 2D:', convertServer3DTo2D(10, 0, 15));
        
        // Calculate expected distances
        console.log('\n=== Distance Tests ===');
        const ballAt3D = { x: 0, y: 1, z: 0 }; // Server ball position
        const playerNear = { x: 2, y: 0, z: 2 }; // Close to ball
        const playerFar = { x: 5, y: 0, z: 5 }; // Far from ball
        
        const distNear = Math.sqrt(
            Math.pow(playerNear.x - ballAt3D.x, 2) + 
            Math.pow(playerNear.z - ballAt3D.z, 2)
        );
        const distFar = Math.sqrt(
            Math.pow(playerFar.x - ballAt3D.x, 2) + 
            Math.pow(playerFar.z - ballAt3D.z, 2)
        );
        
        console.log('Near player distance:', distNear, '(should be < 2.5)');
        console.log('Far player distance:', distFar, '(should be > 2.5)');
        
        // Helper functions for the UI
        function moveToCenter() {
            console.log('Moving to center (400, 300) -> 3D (0, 0, 0)');
            document.getElementById('status').textContent = 'Move to center requested';
        }
        
        function moveToBall() {
            console.log('Moving to ball position');
            document.getElementById('status').textContent = 'Move to ball requested';
        }
        
        function tryPickup() {
            console.log('Attempting pickup');
            document.getElementById('status').textContent = 'Pickup attempted';
        }
    </script>
</body>
</html>
